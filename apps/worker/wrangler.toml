name = "showtracker-worker"
main = "src/index.ts"
compatibility_date = "2024-09-01"
compatibility_flags = ["nodejs_compat"]

[triggers]
crons = ["0 8 * * *"]

[[d1_databases]]
binding = "DB"
database_name = "showtracker"
database_id = "1d61de6c-32e9-401d-bc68-aacaab9bab7b"
migrations_dir = "migrations"

[observability.logs]
enabled = false
invocation_logs = true

[observability.traces]
enabled = false

[vars]
TRAKT_REDIRECT_URI = "https://your-domain.com/api/auth/callback"
EMAIL_FROM = "notifications@your-domain.com"

# Secrets — set with: wrangler secret put <KEY>
# TRAKT_CLIENT_ID
# TRAKT_CLIENT_SECRET
# JWT_SECRET
# RESEND_API_KEY
# TMDB_API_KEY  (optional — enables show poster images)
