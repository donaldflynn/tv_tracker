name = "showtracker-web"
main = "src/worker.ts"
compatibility_date = "2024-09-01"

[assets]
directory = "dist"
not_found_handling = "single-page-application"

# Service binding — routes /api/* internally to the API worker.
# No public URL needed; traffic never leaves Cloudflare's network.
[[services]]
binding = "API"
service = "showtracker-worker"
